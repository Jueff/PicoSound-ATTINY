[platformio]
src_dir = src

[env]
framework = arduino
build_src_flags = 

[env:PicoSound-Tiny]
extra_scripts = pre:copy_firmware.py
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
Board = pico
board_build.core = earlephilhower
build_flags = -DAPP_VERSION=0.3 -DMP3_DEBUG=1
lib_deps =
    WS281xProcessor= https://github.com/Jueff/WS281xProcessor.git#v1.0.0
    MobaLedLib=      https://github.com/Hardi-St/MobaLedLib#longInpAddresses
    PicoFlashStorage=https://github.com/Jueff/PicoFlashStorage.git#v1.0.0
    MLLSoundTiny=    https://github.com/Jueff/MLLSoundTiny#v0.1.0
    SoftwareSerialTx@=0.1.0